<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
    <title>Document</title>
    {% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="padding-bottom: 20px;">
    <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-light" href="#">BookVault</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{% url 'Add_Book' %}">Add Book</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{% url 'View_Book' %}">View Book</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <!-- <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" /> -->
                    {% if user.is_authenticated %}
                    <span style="margin-top: 4px;
                                font-size: 18px;
                                color: white;
                                margin-right: 15px;
                                font-weight: bold;">{{user.username}}</span>
                    <a href="{% url 'Sign_Out' %}"><button class="btn btn-light me-2 text-dark" type="button">Sign
                            Out</button></a>
                    {% else %}
                    <a href="{% url 'Sign_Up' %}"><button class="btn btn-light me-2 text-dark" type="button">Sign
                            Up</button></a>
                    <a href="{% url 'Sign_In' %}"><button class="btn btn-light me-2 text-dark" type="button">Sign
                            In</button></a>
                    {% endif %}
                </form>
            </div>
        </div>
    </nav>


    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
