{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
<title>Add Book</title>
{% endblock %}

{% block content %}
<div class="container" style="
    background-color: #74aee0; 
    border: 2px solid black; 
    border-radius: 20px;
    padding: 20px;
    margin-top: 10px;">
    <h1 style="text-align: center; margin-bottom: 20px; color: white;">Add Book Details</h1>
    <form method="post">
        {% csrf_token %}
        {{form | crispy}}
        <br>
        <button type="submit" class="btn btn-light col-5">Add Book</button>
        <button type="reset" class="btn btn-light col-5 float-end">Reset Book</button>
    </form>
</div>
{% endblock %}
