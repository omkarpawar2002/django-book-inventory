{% extends 'base.html' %}

{% block title %}
<title>Sign In</title>
{% endblock %}

{% block content %}
<div class="container" style="
    background-color: #74aee0; 
    border: 2px solid black; 
    border-radius: 20px;
    padding: 20px;
    margin-top: 10px;">
    <h1 style="text-align: center; margin-bottom: 20px; color: white;">Sign In / Log In</h1>
    <form method="post">
        {% csrf_token %}
        <div>
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter Your Username" class="form-control">
        </div>
        <br>
        <div>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="********" class="form-control">
        </div>
        <br>
        <div>
            <button type="submit" class="btn btn-light col-5">Sign In</button>
            <a href="{% url 'Sign_Up' %}"><button type="button" class="btn btn-light col-5 float-end">Sign
                    Up</button></a>
        </div>
    </form>
</div>
{% endblock %}
